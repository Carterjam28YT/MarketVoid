<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Void Market</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;color:#e0e0e0;padding:2rem;}
.container{max-width:1200px;margin:0 auto;}
.header{text-align:center;margin-bottom:2rem;border-bottom:1px solid #2a2a2a;padding-bottom:1rem;}
.header h1{font-size:2.5rem;letter-spacing:2px;}
.header h1 span{color:#ffffff;background:#000;padding:0 8px;}
.header p{color:#888;margin-top:0.5rem;}
.category-tabs{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:2rem;justify-content:center;}
.cat-btn{background:#111;border:1px solid #2a2a2a;color:#aaa;padding:10px 20px;border-radius:30px;cursor:pointer;font-size:0.85rem;transition:all 0.1s;}
.cat-btn:hover{background:#1a1a1a;border-color:#444;color:#ddd;}
.cat-btn.active{background:#000;border-color:#fff;color:#fff;}
.mod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem;margin-bottom:3rem;}
.mod-card{background:#111;border:1px solid #2a2a2a;border-radius:12px;padding:1.2rem;transition:all 0.2s ease;}
.mod-card:hover{border-color:#444;background:#151515;}
.mod-name{font-size:1.3rem;font-weight:bold;margin-bottom:0.3rem;color:#fff;}
.mod-version{font-size:0.75rem;color:#666;margin-bottom:0.75rem;}
.mod-desc{font-size:0.85rem;color:#aaa;margin-bottom:1rem;line-height:1.4;}
.mod-category{display:inline-block;background:#1a1a1a;border:1px solid #2a2a2a;font-size:0.7rem;padding:2px 8px;border-radius:20px;margin-bottom:0.75rem;color:#888;}
.download-btn{display:inline-block;background:#1f1f1f;color:#fff;text-decoration:none;padding:8px 16px;border-radius:6px;font-size:0.8rem;font-weight:bold;border:1px solid #333;transition:0.1s linear;}
.download-btn:hover{background:#2a2a2a;border-color:#555;}
.request-section{background:#0e0e0e;border:1px solid #2a2a2a;border-radius:16px;padding:2rem;margin-bottom:2rem;}
.request-section h2{font-size:1.5rem;margin-bottom:1rem;}
.request-section input,.request-section textarea{width:100%;background:#1a1a1a;border:1px solid #333;color:#fff;padding:12px;border-radius:8px;margin-bottom:1rem;font-size:0.9rem;}
.request-section input:focus,.request-section textarea:focus{outline:none;border-color:#666;}
.request-section button{background:#000;color:#fff;border:2px solid #fff;padding:12px 24px;border-radius:8px;font-size:1rem;font-weight:bold;cursor:pointer;}
.request-section button:hover{background:#222;}
.footer-links{display:flex;gap:2rem;justify-content:center;margin-top:2rem;padding-top:2rem;border-top:1px solid #2a2a2a;}
.footer-links a{color:#888;text-decoration:none;}
.footer-links a:hover{color:#fff;}
#statusMsg{margin-top:1rem;padding:10px;border-radius:8px;display:none;}
.success{background:#1a3a1a;color:#8bc34a;border:1px solid #4caf50;}
.error{background:#3a1a1a;color:#ff8a8a;border:1px solid #f44336;}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>VOID MARKET</h1>
<p>cracked free unlimited</p>
</div>

<div class="category-tabs">
<button class="cat-btn active" data-cat="all">all</button>
<button class="cat-btn" data-cat="skin pack">skin pack</button>
<button class="cat-btn" data-cat="world">world</button>
<button class="cat-btn" data-cat="addon">addon</button>
<button class="cat-btn" data-cat="mod">mod</button>
</div>

<div id="modsContainer" class="mod-grid">loading items...</div>

<div class="request-section">
<h2>REQUEST AN ITEM</h2>
<input type="text" id="reqName" placeholder="your name optional">
<input type="text" id="reqItem" placeholder="item name category">
<textarea id="reqDetails" rows="3" placeholder="description link what you want"></textarea>
<button id="submitReq">SEND REQUEST</button>
<div id="statusMsg"></div>
</div>

<div class="footer-links">
<a href="#" id="tosLink">TOS coming soon</a>
<a href="#" id="teamLink">MEET THE TEAM soon</a>
</div>
</div>

<script>
const modsJsonUrl = "mods.json";
const discordWebhook = "https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN";

let allItems = [];
let currentCategory = "all";

async function loadItems(){
try{
const response=await fetch(modsJsonUrl);
if(!response.ok)throw new Error("mods.json not found");
allItems=await response.json();
renderItems();
}catch(error){
document.getElementById("modsContainer").innerHTML="<p>failed to load mods.json make sure file exists</p>";
}
}

function renderItems(){
const container=document.getElementById("modsContainer");
let filtered = allItems;
if(currentCategory !== "all"){
filtered = allItems.filter(item => item.category && item.category.toLowerCase() === currentCategory);
}
if(!filtered.length){
container.innerHTML="<p>no items in this category</p>";
return;
}
let html="";
for(let i=0;i<filtered.length;i++){
const item=filtered[i];
html+=`
<div class="mod-card">
<div class="mod-category">${item.category || "uncategorized"}</div>
<div class="mod-name">${item.name}</div>
<div class="mod-version">${item.version || "unknown"}</div>
<div class="mod-desc">${item.description || "no description"}</div>
<a class="download-btn" href="${item.downloadLink}" target="_blank">DOWNLOAD</a>
</div>
`;
}
container.innerHTML=html;
}

async function sendRequest(name,item,details){
if(!item.trim()){showStatus("please enter an item name","error");return false;}
const payload={
content:null,
embeds:[{
title:"NEW REQUEST VOID MARKET",
color:0x000000,
fields:[
{name:"DATE",value:new Date().toLocaleString(),inline:true},
{name:"REQUESTER",value:name.trim()||"anonymous",inline:true},
{name:"ITEM NAME CATEGORY",value:item.trim(),inline:false},
{name:"DETAILS",value:details.trim()||"none",inline:false}
],
footer:{text:"Void Market cracked section"}
}]
};
try{
const response=await fetch(discordWebhook,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
});
if(response.ok){showStatus("request sent to discord","success");return true;}
else{showStatus("discord webhook error","error");return false;}
}catch(e){showStatus("failed to send check webhook url","error");return false;}
}

function showStatus(msg,type){
const div=document.getElementById("statusMsg");
div.textContent=msg;
div.className=type;
div.style.display="block";
setTimeout(()=>{div.style.display="none";},4000);
}

document.getElementById("submitReq").addEventListener("click",()=>{
const name=document.getElementById("reqName").value;
const item=document.getElementById("reqItem").value;
const details=document.getElementById("reqDetails").value;
sendRequest(name,item,details);
});

document.querySelectorAll(".cat-btn").forEach(btn=>{
btn.addEventListener("click",()=>{
document.querySelectorAll(".cat-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
currentCategory=btn.getAttribute("data-cat");
renderItems();
});
});

document.getElementById("tosLink").addEventListener("click",(e)=>{e.preventDefault();alert("TOS page coming soon");});
document.getElementById("teamLink").addEventListener("click",(e)=>{e.preventDefault();alert("Meet the team page coming soon");});

loadItems();
</script>
</body>
</html>
